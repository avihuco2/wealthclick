name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Minimal permissions: read code + request OIDC token
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: il-central-1

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          echo "Sending deploy command to $INSTANCE_ID..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --region il-central-1 \
            --comment "Deploy from GitHub Actions ${{ github.sha }}" \
            --parameters 'commands=[
              "#!/bin/bash",
              "set -euo pipefail",
              "echo '\''--- Deploy started at $(date) ---'\''",
              "swapon /swapfile 2>/dev/null || true",
              "echo '\''--- Writing .env from Secrets Manager ---'\''",
              "/usr/local/bin/aws secretsmanager get-secret-value --region il-central-1 --secret-id wealthclick/app --query SecretString --output text | python3 -c '\''import json,sys; d=json.load(sys.stdin); [print(f\"{k}={v}\") for k,v in d.items()]'\'' > /opt/wealthclick/apps/web/.env",
              "chown ubuntu:ubuntu /opt/wealthclick/apps/web/.env",
              "chmod 600 /opt/wealthclick/apps/web/.env",
              "chown -R ubuntu:ubuntu /opt/wealthclick",
              "cd /opt/wealthclick",
              "sudo -u ubuntu git pull origin main",
              "cd apps/web",
              "sudo -u ubuntu npm ci",
              "sudo -u ubuntu npm run build",
              "sudo -u ubuntu npm run db:migrate",
              "sudo -H -u ubuntu pm2 restart wealthclick --update-env",
              "echo '\''--- Deploy complete ---'\''"
            ]' \
            --output text \
            --query "Command.CommandId")

          echo "SSM Command ID: $COMMAND_ID"

          # Poll until success or failure (max 5 minutes)
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region il-central-1 \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Status (${i}/30): $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ Deploy succeeded"
              # Print deploy output
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region il-central-1 \
                --query "StandardOutputContent" \
                --output text
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ Deploy failed with status: $STATUS"
              # Print error output to help debug
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region il-central-1 \
                --query "StandardErrorContent" \
                --output text || true
              exit 1
            fi
          done

          echo "❌ Timed out waiting for deploy to complete"
          exit 1
